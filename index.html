<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCC Builder — learn the National Construction Code by building a house</title>
<meta name="description" content="A free learning game for the Australian National Construction Code (NCC). Build a house phase by phase and pass the inspection.">
<!-- CACHE-BUSTING: bump ?v= whenever you change any css/js/data file, so
     returning players (and the dev preview) load the new version instead of a
     cached copy. Keep the SAME number on every tag below. -->
<link rel="stylesheet" href="css/style.css?v=30">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="logo" aria-hidden="true">&#127968;</span>
    <div>
      <h1>NCC Builder</h1>
      <p class="tagline">Learn the National Construction Code by building a house, one inspection at a time</p>
    </div>
  </div>
</header>

<!-- All screens are rendered into this element by js/app.js -->
<main id="screen" class="screen"></main>

<!-- Jargon popup (filled and shown by js/glossary.js) -->
<div id="jargon-overlay" class="overlay hidden">
  <div class="jargon-card" role="dialog" aria-modal="true">
    <button class="close-btn" id="jargon-close" aria-label="Close">&times;</button>
    <div id="jargon-body"></div>
  </div>
</div>

<footer class="footer">
  <p id="edition-line"></p>
  <p id="credit-line"></p>
</footer>

<!-- Content (data) files: plain JS so the game also works when opened
     directly from the file system, no web server needed. -->
<script src="data/edition.js?v=30"></script>
<script src="data/glossary.js?v=30"></script>
<script src="data/phase1-site-preparation.js?v=30"></script>
<script src="data/phase2-footings-slabs.js?v=30"></script>
<script src="data/phase3-walls.js?v=30"></script>
<script src="data/phase4-roof.js?v=30"></script>
<script src="data/phase5-glazing.js?v=30"></script>
<script src="data/phase6-fire.js?v=30"></script>
<script src="data/phase7-amenity.js?v=30"></script>
<script src="data/phase8-stairs.js?v=30"></script>
<script src="data/phase9-energy.js?v=30"></script>
<script src="data/phase10-ancillary.js?v=30"></script>
<script src="data/phase11-livable.js?v=30"></script>
<script src="data/phases.js?v=30"></script>

<!-- Engine files -->
<script src="js/glossary.js?v=30"></script>
<script src="js/questions.js?v=30"></script>
<script src="js/app.js?v=30"></script>
</body>
</html>
