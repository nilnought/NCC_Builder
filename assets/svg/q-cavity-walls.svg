<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="sans-serif">
<rect width="700" height="300" fill="#eef7fb"/>
<rect x="180" y="40" width="70" height="220" fill="#cd7d58"/>
<rect x="330" y="40" width="70" height="220" fill="#cd7d58"/>
<g stroke="#a8512f" stroke-width="1.5">
<line x1="180" y1="80" x2="250" y2="80"/><line x1="180" y1="120" x2="250" y2="120"/><line x1="180" y1="160" x2="250" y2="160"/><line x1="180" y1="200" x2="250" y2="200"/>
<line x1="330" y1="80" x2="400" y2="80"/><line x1="330" y1="120" x2="400" y2="120"/><line x1="330" y1="160" x2="400" y2="160"/><line x1="330" y1="200" x2="400" y2="200"/></g>
<text x="215" y="285" font-size="12.5" fill="#2c2a26" text-anchor="middle">outer leaf</text>
<text x="365" y="285" font-size="12.5" fill="#2c2a26" text-anchor="middle">inner leaf</text>
<line x1="250" y1="150" x2="330" y2="150" stroke="#d85a30" stroke-width="2"/>
<line x1="250" y1="142" x2="250" y2="158" stroke="#d85a30" stroke-width="2"/>
<line x1="330" y1="142" x2="330" y2="158" stroke="#d85a30" stroke-width="2"/>
<text x="290" y="138" font-size="16" font-weight="bold" fill="#d85a30" text-anchor="middle">?</text>
<text x="290" y="120" font-size="12.5" fill="#d85a30" text-anchor="middle">cavity</text>
<text x="460" y="150" font-size="14" fill="#2c2a26">two brick walls with a gap —</text>
<text x="460" y="170" font-size="14" fill="#2c2a26">how thick, how wide?</text>
</svg>
