<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="sans-serif">
<rect width="700" height="260" fill="#eef7fb"/>
<rect x="120" y="30" width="70" height="200" fill="#cd7d58"/>
<g stroke="#a8512f" stroke-width="1.5"><line x1="120" y1="70" x2="190" y2="70"/><line x1="120" y1="110" x2="190" y2="110"/><line x1="120" y1="150" x2="190" y2="150"/><line x1="120" y1="190" x2="190" y2="190"/></g>
<text x="155" y="248" font-size="11.5" fill="#2c2a26" text-anchor="middle">brick skin</text>
<rect x="300" y="30" width="40" height="200" fill="#cfae87"/>
<g stroke="#a88a5f" stroke-width="6"><line x1="320" y1="30" x2="320" y2="230"/></g>
<text x="320" y="248" font-size="11.5" fill="#2c2a26" text-anchor="middle">timber frame</text>
<g stroke="#5f5e5a" stroke-width="4"><line x1="180" y1="110" x2="302" y2="110"/><line x1="180" y1="170" x2="302" y2="170"/></g>
<text x="240" y="100" font-size="12.5" fill="#d85a30" text-anchor="middle">wall tie</text>
<text x="430" y="120" font-size="13" fill="#2c2a26">these little ties link the brick</text>
<text x="430" y="142" font-size="13" fill="#2c2a26">skin to the frame — which type?</text>
</svg>
