<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="sans-serif">
  <rect width="700" height="320" fill="#eef7fb"/>
  <!-- floor -->
  <rect x="0" y="270" width="700" height="30" fill="#c9a36b"/>
  <!-- living room (left) -->
  <rect x="50" y="60" width="280" height="210" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
  <rect x="40" y="54" width="300" height="8" fill="#8a6f4e"/>
  <text x="190" y="180" font-size="16" fill="#2c2a26" text-anchor="middle">living room</text>
  <line x1="68" y1="64" x2="68" y2="268" stroke="#d85a30" stroke-width="2"/>
  <line x1="62" y1="64" x2="74" y2="64" stroke="#d85a30" stroke-width="2"/>
  <line x1="62" y1="268" x2="74" y2="268" stroke="#d85a30" stroke-width="2"/>
  <text x="80" y="135" font-size="18" font-weight="bold" fill="#d85a30">?</text>
  <text x="80" y="153" font-size="12" fill="#d85a30">min height</text>
  <!-- bathroom (right, lower ceiling) -->
  <rect x="380" y="110" width="260" height="160" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
  <rect x="370" y="104" width="280" height="8" fill="#8a6f4e"/>
  <text x="510" y="200" font-size="16" fill="#2c2a26" text-anchor="middle">bathroom</text>
  <line x1="660" y1="112" x2="660" y2="270" stroke="#d85a30" stroke-width="2"/>
  <text x="672" y="195" font-size="18" font-weight="bold" fill="#d85a30">?</text>
  <text x="350" y="296" font-size="13" fill="#6b675f" text-anchor="middle">a habitable room and a utility room — same minimum height?</text>
</svg>
