<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="sans-serif">
<rect width="700" height="230" fill="#eef7fb"/>
<text x="350" y="32" font-size="13.5" fill="#2c2a26" text-anchor="middle">A hot-water pipe and a heating/cooling duct run through the house</text>
<!-- wall edges they pass between -->
<rect x="40" y="60" width="16" height="130" fill="#ece7da" stroke="#c9bfa8" stroke-width="1"/>
<rect x="630" y="60" width="16" height="130" fill="#ece7da" stroke="#c9bfa8" stroke-width="1"/>
<!-- hot-water pipe (copper) -->
<rect x="56" y="86" width="574" height="16" rx="8" fill="#c87b3a" stroke="#9a5a26" stroke-width="1.5"/>
<text x="100" y="80" font-size="11.5" fill="#2c2a26">hot-water pipe</text>
<!-- heating/cooling duct (rectangular) -->
<rect x="56" y="128" width="574" height="28" fill="#b9bdc0" stroke="#8a8f93" stroke-width="1.5"/>
<text x="100" y="148" font-size="11.5" fill="#2c2a26">heating / cooling duct</text>
<!-- both bare — what does the code require? -->
<text x="350" y="200" font-size="13.5" fill="#d85a30" text-anchor="middle">Both run bare — what does Part 13.7 require of them?</text>
</svg>
