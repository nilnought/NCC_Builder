<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="sans-serif">
  <rect width="700" height="300" fill="#eef7fb"/>
  <rect x="0" y="250" width="700" height="50" fill="#d8cbb4"/>
  <!-- doorway (plan/elevation hybrid) -->
  <rect x="300" y="70" width="16" height="180" fill="#8a6f4e"/>
  <rect x="430" y="70" width="16" height="180" fill="#8a6f4e"/>
  <rect x="300" y="60" width="146" height="12" fill="#8a6f4e"/>
  <!-- clear width dimension -->
  <line x1="316" y1="240" x2="430" y2="240" stroke="#d85a30" stroke-width="2"/>
  <line x1="316" y1="232" x2="316" y2="248" stroke="#d85a30" stroke-width="2"/>
  <line x1="430" y1="232" x2="430" y2="248" stroke="#d85a30" stroke-width="2"/>
  <text x="373" y="228" font-size="18" font-weight="bold" fill="#d85a30" text-anchor="middle">? clear width</text>
  <!-- simple wheelchair glyph approaching -->
  <g fill="#534ab7">
    <circle cx="150" cy="150" r="14"/>
    <circle cx="150" cy="220" r="26" fill="none" stroke="#534ab7" stroke-width="5"/>
    <rect x="138" y="170" width="12" height="40"/>
  </g>
  <text x="150" y="270" font-size="13" fill="#2c2a26" text-anchor="middle">unimpeded movement</text>
</svg>
