<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="sans-serif">
  <rect width="700" height="260" fill="#eef7fb"/>
  <!-- your wall -->
  <rect x="30" y="80" width="190" height="100" rx="10" fill="#faece7" stroke="#d85a30" stroke-width="2"/>
  <text x="125" y="118" font-size="15" fill="#993c1d" text-anchor="middle">your wall type:</text>
  <text x="125" y="140" font-size="14" fill="#993c1d" text-anchor="middle">reinforced single</text>
  <text x="125" y="158" font-size="14" fill="#993c1d" text-anchor="middle">leaf masonry</text>
  <text x="125" y="70" font-size="13" fill="#6b675f" text-anchor="middle">not a column in any footing table!</text>
  <!-- translator -->
  <line x1="220" y1="130" x2="262" y2="130" stroke="#6b675f" stroke-width="2.5"/>
  <polygon points="276,130 256,122 256,138" fill="#6b675f"/>
  <rect x="280" y="80" width="150" height="100" rx="10" fill="#f5f3ee" stroke="#8f8c84" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="355" y="125" font-size="26" font-weight="bold" fill="#d85a30" text-anchor="middle">?</text>
  <text x="355" y="150" font-size="13" fill="#6b675f" text-anchor="middle">how do you proceed?</text>
  <!-- the footing tables -->
  <line x1="430" y1="130" x2="472" y2="130" stroke="#6b675f" stroke-width="2.5"/>
  <polygon points="486,130 466,122 466,138" fill="#6b675f"/>
  <rect x="490" y="60" width="180" height="140" rx="10" fill="#e1f5ee" stroke="#1d9e75" stroke-width="2"/>
  <text x="580" y="88" font-size="14" fill="#085041" text-anchor="middle">the footing tables know:</text>
  <text x="580" y="112" font-size="13" fill="#0f6e56" text-anchor="middle">clad frame</text>
  <text x="580" y="132" font-size="13" fill="#0f6e56" text-anchor="middle">masonry veneer</text>
  <text x="580" y="152" font-size="13" fill="#0f6e56" text-anchor="middle">articulated full masonry</text>
  <text x="580" y="172" font-size="13" fill="#0f6e56" text-anchor="middle">full masonry …</text>
</svg>
