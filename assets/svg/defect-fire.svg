<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <defs><marker id="fa" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 1 L8 4 L0 7 Z" fill="#d85a30"/></marker></defs>
  <rect width="800" height="460" fill="#eef7fb"/>
  <!-- allotment boundaries -->
  <line x1="34" y1="74" x2="34" y2="404" stroke="#d85a30" stroke-width="3" stroke-dasharray="10 6"/>
  <text x="34" y="66" font-size="11.5" fill="#993c1d" text-anchor="middle">boundary</text>
  <text x="34" y="422" font-size="11.5" fill="#993c1d" text-anchor="middle">boundary</text>
  <line x1="782" y1="74" x2="782" y2="404" stroke="#d85a30" stroke-width="3" stroke-dasharray="10 6"/>
  <text x="782" y="66" font-size="11.5" fill="#993c1d" text-anchor="middle">boundary</text>
  <text x="782" y="422" font-size="11.5" fill="#993c1d" text-anchor="middle">boundary</text>
  <!-- ground + slab -->
  <rect x="56" y="362" width="712" height="40" fill="#b9b6ad"/>
  <rect x="0" y="402" width="800" height="58" fill="#c9a36b"/>
  <!-- dwellings -->
  <rect x="64" y="150" width="356" height="212" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
  <rect x="420" y="150" width="324" height="212" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
  <!-- roofs -->
  <polygon points="56,150 428,150 242,84" fill="#c96f4a"/>
  <polygon points="420,150 752,150 586,84" fill="#c96f4a"/>
  <!-- OPEN ROOF SPACE (attic void) above the ceiling — distinct light shade -->
  <rect x="64" y="150" width="680" height="46" fill="#d6e3e8"/>
  <line x1="64" y1="196" x2="744" y2="196" stroke="#c2ad83" stroke-width="3"/>
  <text x="430" y="174" font-size="11.5" fill="#235c6e" text-anchor="middle">open roof space over BOTH dwellings</text>
  <!-- dwelling labels -->
  <text x="200" y="348" font-size="14" fill="#6b675f" text-anchor="middle">dwelling A</text>
  <text x="488" y="348" font-size="14" fill="#6b675f" text-anchor="middle">dwelling B</text>

  <!-- (1) boundary wall + openable window, 600 mm off boundary -->
  <rect x="64" y="196" width="10" height="166" fill="#c96f4a"/>
  <rect x="82" y="252" width="46" height="58" fill="#cfe8f0" stroke="#8aa6ad" stroke-width="2"/>
  <line x1="105" y1="252" x2="105" y2="310" stroke="#8aa6ad" stroke-width="2"/>
  <line x1="34" y1="334" x2="64" y2="334" stroke="#993c1d" stroke-width="1.5"/>
  <line x1="34" y1="330" x2="34" y2="338" stroke="#993c1d" stroke-width="1.5"/>
  <line x1="64" y1="330" x2="64" y2="338" stroke="#993c1d" stroke-width="1.5"/>
  <text x="52" y="349" font-size="10" fill="#993c1d" text-anchor="middle">600 mm</text>
  <text x="138" y="282" font-size="11" fill="#2c2a26">openable window</text>

  <!-- (2) party wall stops at the ceiling -->
  <rect x="414" y="196" width="12" height="166" fill="#8f8c84"/>
  <text x="420" y="232" font-size="11" fill="#993c1d" text-anchor="middle">party wall</text>
  <text x="420" y="246" font-size="11" fill="#993c1d" text-anchor="middle">stops at ceiling</text>

  <!-- (4) hallway alarm (dwelling A), compliant -->
  <text x="250" y="180" font-size="11" fill="#2c2a26" text-anchor="middle">hallway by the bedrooms</text>
  <circle cx="250" cy="206" r="11" fill="#ffffff" stroke="#5f5e5a" stroke-width="2"/>
  <circle cx="250" cy="206" r="3.5" fill="#1d9e75"/>

  <!-- (3) kitchen alarm over the cooktop (dwelling B), defect -->
  <text x="598" y="180" font-size="11" fill="#2c2a26" text-anchor="middle">the only alarm</text>
  <circle cx="598" cy="206" r="11" fill="#ffffff" stroke="#5f5e5a" stroke-width="2"/>
  <circle cx="598" cy="206" r="3.5" fill="#e24b4a"/>
  <rect x="556" y="320" width="84" height="42" fill="#b3b0a6" stroke="#8a8a82" stroke-width="1"/>
  <g stroke="#7a7870" stroke-width="2" fill="none"><circle cx="576" cy="332" r="5"/><circle cx="600" cy="332" r="5"/><circle cx="620" cy="332" r="5"/></g>
  <text x="598" y="354" font-size="11" fill="#2c2a26" text-anchor="middle">cooktop</text>

  <!-- (5) eaves + fascia set back >=450 mm from boundary (dwelling B) -->
  <rect x="744" y="150" width="30" height="8" fill="#b8c4cc"/>
  <rect x="740" y="150" width="6" height="22" fill="#8a6f4e"/>
  <line x1="746" y1="180" x2="782" y2="180" stroke="#0f6e56" stroke-width="1.5"/>
  <line x1="746" y1="176" x2="746" y2="184" stroke="#0f6e56" stroke-width="1.5"/>
  <line x1="782" y1="176" x2="782" y2="184" stroke="#0f6e56" stroke-width="1.5"/>
  <text x="764" y="194" font-size="9.5" fill="#0f6e56" text-anchor="middle">&#8805;450 mm</text>
  <text x="690" y="140" font-size="10.5" fill="#2c2a26" text-anchor="middle">non-comb. eaves; fascia set back</text>
</svg>
