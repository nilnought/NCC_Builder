<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="sans-serif">
  <rect width="700" height="300" fill="#eef7fb"/>
  <!-- wall sitting on the slab -->
  <rect x="320" y="20" width="380" height="100" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
  <text x="510" y="78" font-size="16" fill="#2c2a26" text-anchor="middle">wall</text>
  <!-- concrete slab -->
  <rect x="300" y="120" width="400" height="80" fill="#b9b6ad"/>
  <line x1="300" y1="120" x2="700" y2="120" stroke="#8f8c84" stroke-width="3"/>
  <text x="510" y="165" font-size="16" fill="#3d3b36" text-anchor="middle">concrete slab-on-ground</text>
  <text x="510" y="112" font-size="14" fill="#6b675f" text-anchor="middle">floor level</text>
  <!-- ground -->
  <polygon points="0,190 300,190 300,300 0,300" fill="#c9a36b"/>
  <polygon points="300,200 700,200 700,300 300,300" fill="#c9a36b"/>
  <line x1="0" y1="190" x2="300" y2="190" stroke="#9bc97e" stroke-width="5"/>
  <text x="145" y="218" font-size="15" fill="#2c2a26" text-anchor="middle">finished ground (soil)</text>
  <!-- height dimension -->
  <line x1="262" y1="120" x2="262" y2="190" stroke="#d85a30" stroke-width="2"/>
  <line x1="254" y1="120" x2="270" y2="120" stroke="#d85a30" stroke-width="2"/>
  <line x1="254" y1="190" x2="270" y2="190" stroke="#d85a30" stroke-width="2"/>
  <line x1="262" y1="120" x2="298" y2="120" stroke="#d85a30" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="246" y="148" font-size="20" font-weight="bold" fill="#d85a30" text-anchor="end">? mm</text>
  <text x="246" y="168" font-size="14" fill="#d85a30" text-anchor="end">min height</text>
</svg>
