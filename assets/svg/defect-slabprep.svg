<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="sans-serif">
  <rect width="800" height="450" fill="#eef7fb"/>
  <!-- natural ground at far left, with an open edge-beam trench -->
  <polygon points="0,250 160,250 160,450 0,450" fill="#c9a36b"/>
  <line x1="0" y1="250" x2="160" y2="250" stroke="#9bc97e" stroke-width="5"/>
  <polygon points="30,250 140,250 140,360 30,360" fill="#a8843f"/>
  <line x1="30" y1="250" x2="30" y2="360" stroke="#7c5f2c" stroke-width="2"/>
  <line x1="140" y1="250" x2="140" y2="360" stroke="#7c5f2c" stroke-width="2"/>
  <text x="85" y="180" font-size="13" fill="#6b675f" text-anchor="middle">edge beam trench</text>
  <!-- roots and loose lumps in the trench base (defect) -->
  <g stroke="#5a3d1a" stroke-width="4" fill="none">
    <path d="M42 338 q16 -14 34 0 q14 12 28 -4 q10 -8 22 2"/>
    <path d="M60 352 q20 -12 42 2 q14 8 28 -2"/>
  </g>
  <g fill="#8a6f4e">
    <circle cx="52" cy="350" r="7"/><circle cx="112" cy="346" r="8"/><circle cx="88" cy="334" r="6"/>
  </g>
  <!-- platform: compacted fill -->
  <rect x="160" y="300" width="630" height="60" fill="#bb9159"/>
  <rect x="0" y="360" width="800" height="90" fill="#c9a36b"/>
  <text x="600" y="345" font-size="13" fill="#f5f3ee" text-anchor="middle">compacted fill platform</text>
  <!-- edge formwork board -->
  <rect x="148" y="228" width="14" height="80" fill="#8a6f4e"/>
  <!-- sand blinding layer (compliant) -->
  <rect x="162" y="292" width="628" height="12" fill="#efd07a"/>
  <!-- vapour barrier membrane, with a big unrepaired tear (defect) -->
  <rect x="162" y="286" width="128" height="6" fill="#2c2a26"/>
  <rect x="356" y="286" width="434" height="6" fill="#2c2a26"/>
  <path d="M290 292 q33 -22 66 0" fill="#a8843f"/>
  <path d="M290 290 L300 272 L308 284 L314 270" stroke="#2c2a26" stroke-width="4" fill="none"/>
  <path d="M356 290 L346 274 L338 286 L332 272" stroke="#2c2a26" stroke-width="4" fill="none"/>
  <!-- waffle pods -->
  <g fill="#f5f3ee" stroke="#d3d1c7" stroke-width="2">
    <rect x="170" y="240" width="112" height="46" rx="5"/>
    <rect x="364" y="240" width="90" height="46" rx="5"/>
    <rect x="460" y="240" width="90" height="46" rx="5"/>
    <rect x="558" y="240" width="105" height="46" rx="5"/>
    <rect x="670" y="240" width="110" height="46" rx="5"/>
  </g>
  <!-- mesh up on proper bar chairs (compliant region) -->
  <text x="330" y="202" font-size="13" fill="#6b675f">slab mesh</text>
  <g stroke="#3d3b36" stroke-width="3.5">
    <line x1="380" y1="216" x2="552" y2="216"/>
    <line x1="400" y1="209" x2="400" y2="223"/><line x1="445" y1="209" x2="445" y2="223"/>
    <line x1="490" y1="209" x2="490" y2="223"/><line x1="535" y1="209" x2="535" y2="223"/>
  </g>
  <g fill="#2c2a26">
    <polygon points="405,218 395,240 415,240"/>
    <polygon points="470,218 460,240 480,240"/>
    <polygon points="540,218 530,240 550,240"/>
  </g>
  <!-- mesh walked flat, lying directly on the pods, no chairs (defect) -->
  <g stroke="#3d3b36" stroke-width="3.5">
    <path d="M552 216 q14 16 26 21 L778 238"/>
    <line x1="606" y1="231" x2="606" y2="245"/><line x1="652" y1="231" x2="652" y2="245"/>
    <line x1="698" y1="231" x2="698" y2="245"/><line x1="744" y1="231" x2="744" y2="245"/>
  </g>
</svg>
