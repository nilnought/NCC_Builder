<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="sans-serif">
  <rect width="700" height="300" fill="#eef7fb"/>
  <text x="350" y="30" font-size="14" fill="#6b675f" text-anchor="middle">plan view, looking down</text>
  <!-- allotment boundary -->
  <line x1="150" y1="50" x2="150" y2="260" stroke="#d85a30" stroke-width="3" stroke-dasharray="10 6"/>
  <text x="150" y="280" font-size="13" fill="#993c1d" text-anchor="middle">allotment boundary</text>
  <!-- house -->
  <rect x="210" y="70" width="420" height="170" fill="#f0e6d2" stroke="#8a6f4e" stroke-width="2"/>
  <text x="420" y="160" font-size="16" fill="#2c2a26" text-anchor="middle">house</text>
  <!-- the wall facing the boundary -->
  <line x1="210" y1="70" x2="210" y2="240" stroke="#c96f4a" stroke-width="5"/>
  <text x="226" y="60" font-size="12.5" fill="#993c1d">wall facing the boundary</text>
  <!-- setback dimension -->
  <line x1="150" y1="155" x2="210" y2="155" stroke="#d85a30" stroke-width="2"/>
  <line x1="150" y1="147" x2="150" y2="163" stroke="#d85a30" stroke-width="2"/>
  <line x1="210" y1="147" x2="210" y2="163" stroke="#d85a30" stroke-width="2"/>
  <text x="180" y="143" font-size="20" font-weight="bold" fill="#d85a30" text-anchor="middle">?</text>
  <text x="180" y="178" font-size="13" fill="#d85a30" text-anchor="middle">setback</text>
</svg>
