<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <defs><marker id="da" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 1 L8 4 L0 7 Z" fill="#993c1d"/></marker>
        <marker id="ga" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 1 L8 4 L0 7 Z" fill="#0f6e56"/></marker></defs>
  <rect width="800" height="460" fill="#eef7fb"/>
  <!-- floor below (the landing sits above this) -->
  <rect x="0" y="416" width="800" height="44" fill="#c9a36b"/>
  <text x="120" y="440" font-size="11" fill="#7c5f2c">floor below</text>
  <!-- staircase rising left -> right -->
  <polygon points="100,416 100,360 180,360 180,312 260,312 260,264 340,264 340,216 420,216 420,180 540,180 540,416" fill="#d9c9a8" stroke="#8a6f4e" stroke-width="2"/>
  <!-- landing -->
  <rect x="540" y="180" width="210" height="12" fill="#8a6f4e"/>
  <text x="645" y="210" font-size="12.5" fill="#2c2a26" text-anchor="middle">landing</text>

  <!-- (2) open-side balustrade with WIDE gaps (defect) -->
  <g stroke="#5f5e5a" stroke-width="3">
    <line x1="182" y1="360" x2="182" y2="288"/>
    <line x1="262" y1="312" x2="262" y2="240"/>
    <line x1="342" y1="264" x2="342" y2="192"/>
    <line x1="422" y1="216" x2="422" y2="144"/>
    <line x1="502" y1="180" x2="502" y2="108"/>
  </g>
  <!-- gap measurement between two bars -->
  <line x1="272" y1="245" x2="338" y2="245" stroke="#993c1d" stroke-width="1.5" marker-start="url(#da)" marker-end="url(#da)"/>
  <text x="302" y="258" font-size="11" fill="#993c1d" text-anchor="middle">balustrade gap between bars &#8776;160 mm</text>

  <!-- (4) full-length handrail on the open edge, on top of the balustrade (OK) -->
  <line x1="182" y1="282" x2="502" y2="102" stroke="#8a6f4e" stroke-width="7" stroke-linecap="round"/>
  <text x="260" y="148" font-size="11" fill="#8a6f4e">full-length handrail — edge side</text>
  

  <!-- (1) tall riser, bottom step (defect) -->
  <line x1="100" y1="360" x2="100" y2="416" stroke="#d85a30" stroke-width="5"/>
  <line x1="86" y1="360" x2="86" y2="416" stroke="#993c1d" stroke-width="1.3" marker-start="url(#da)" marker-end="url(#da)"/>
  <text x="72" y="392" font-size="11" fill="#993c1d" text-anchor="end">260 mm riser</text>

  <!-- (5) compliant step, riser in range -->
  <line x1="180" y1="312" x2="260" y2="312" stroke="#1d9e75" stroke-width="5"/>
  <text x="252" y="302" font-size="10.5" fill="#0f6e56" text-anchor="end">300 mm going</text>

  <!-- (3) low landing barrier + the >1 m drop that requires it (defect) -->
  <rect x="600" y="150" width="6" height="30" fill="#5f5e5a"/>
  <rect x="700" y="150" width="6" height="30" fill="#5f5e5a"/>
  <rect x="600" y="148" width="106" height="5" fill="#5f5e5a"/>
  <text x="653" y="138" font-size="11" fill="#993c1d" text-anchor="middle">barrier only 700 mm high</text>
  <line x1="744" y1="192" x2="744" y2="416" stroke="#993c1d" stroke-width="1.3" marker-start="url(#da)" marker-end="url(#da)"/>
  <text x="752" y="306" font-size="10.5" fill="#993c1d">&gt;1 m drop</text>
</svg>
