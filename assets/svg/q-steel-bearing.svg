<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 270" font-family="sans-serif">
<rect width="700" height="270" fill="#eef7fb"/>
<!-- column -->
<rect x="120" y="120" width="70" height="120" fill="#8f8c84"/>
<text x="155" y="255" font-size="11.5" fill="#2c2a26" text-anchor="middle">column (support)</text>
<!-- beam sitting on the column -->
<rect x="120" y="96" width="350" height="24" fill="#5f5e5a"/>
<text x="300" y="88" font-size="13" fill="#2c2a26" text-anchor="middle">steel bearer (the member)</text>
<!-- bearing length dimension on the seat -->
<line x1="120" y1="135" x2="190" y2="135" stroke="#d85a30" stroke-width="2"/>
<line x1="120" y1="127" x2="120" y2="143" stroke="#d85a30" stroke-width="2"/>
<line x1="190" y1="127" x2="190" y2="143" stroke="#d85a30" stroke-width="2"/>
<text x="155" y="162" font-size="16" font-weight="bold" fill="#d85a30" text-anchor="middle">?</text>
<text x="155" y="182" font-size="12" fill="#d85a30" text-anchor="middle">bearing</text>
<text x="350" y="235" font-size="13" fill="#2c2a26" text-anchor="middle">how much of the beam must sit on its support?</text>

<!-- cross-section inset: WIDTH vs depth -->
<rect x="496" y="56" width="188" height="158" fill="#ffffff" stroke="#5f5e5a" stroke-width="1.5"/>
<text x="590" y="76" font-size="11.5" fill="#2c2a26" text-anchor="middle">the bearer, end-on</text>
<rect x="556" y="92" width="56" height="80" fill="#5f5e5a"/>
<!-- depth dimension (vertical, muted) -->
<line x1="630" y1="92" x2="630" y2="172" stroke="#8f8c84" stroke-width="1.5"/>
<line x1="624" y1="92" x2="636" y2="92" stroke="#8f8c84" stroke-width="1.5"/>
<line x1="624" y1="172" x2="636" y2="172" stroke="#8f8c84" stroke-width="1.5"/>
<text x="652" y="136" font-size="11" fill="#8f8c84">depth</text>
<!-- width dimension (horizontal, highlighted) -->
<line x1="556" y1="186" x2="612" y2="186" stroke="#2f6b8f" stroke-width="2.5"/>
<line x1="556" y1="180" x2="556" y2="192" stroke="#2f6b8f" stroke-width="2.5"/>
<line x1="612" y1="180" x2="612" y2="192" stroke="#2f6b8f" stroke-width="2.5"/>
<text x="584" y="206" font-size="13" font-weight="bold" fill="#2f6b8f" text-anchor="middle">width</text>
</svg>
