<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="sans-serif">
  <defs><marker id="aa" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 1 L8 4 L0 7 Z" fill="#0f6e56"/></marker></defs>
  <rect width="800" height="450" fill="#eef7fb"/>
  <rect x="0" y="360" width="800" height="90" fill="#c9a36b"/>
  <!-- house centre -->
  <rect x="300" y="150" width="260" height="210" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
  <polygon points="290,150 570,150 430,80" fill="#c96f4a"/>
  <text x="500" y="250" font-size="13" fill="#6b675f" text-anchor="middle">house</text>

  <!-- (4) chimney, parge-LINED inside (OK) -->
  <rect x="382" y="52" width="36" height="8" fill="#8f8c84"/>
  <rect x="386" y="58" width="28" height="42" fill="#a89e8a" stroke="#8f8c84" stroke-width="1.5"/>
  <rect x="394" y="60" width="12" height="40" fill="#3d3b36" stroke="#ece3d0" stroke-width="3"/>
  <text x="430" y="62" font-size="10" fill="#0f6e56">parge-lined flue</text>
  <line x1="428" y1="66" x2="409" y2="74" stroke="#0f6e56" stroke-width="0.9"/>

  <!-- deck (left), attached to the wall at ground level, legs down to the ground -->
  <rect x="60" y="290" width="240" height="12" fill="#8a6f4e"/>
  <g fill="#6b5640"><rect x="78" y="302" width="8" height="58"/><rect x="180" y="302" width="8" height="58"/></g>
  <!-- (1) deck ledger screwed to cladding (defect) -->
  <rect x="290" y="284" width="12" height="28" fill="#993c1d"/>
  <text x="240" y="272" font-size="10.5" fill="#993c1d" text-anchor="middle">ledger fixed to cladding</text>
  <line x1="278" y1="276" x2="294" y2="288" stroke="#993c1d" stroke-width="0.9"/>

  <!-- (5) the joist span NEAREST the wall, within 3 m (OK) — from the first beam to the wall -->
  <line x1="186" y1="316" x2="300" y2="316" stroke="#0f6e56" stroke-width="1.4" marker-start="url(#aa)" marker-end="url(#aa)"/>
  <line x1="244" y1="338" x2="244" y2="320" stroke="#0f6e56" stroke-width="0.9"/>
  <text x="270" y="352" font-size="10.5" fill="#0f6e56" text-anchor="middle">joist span nearest the wall = 2.7 m</text>

  <!-- (2) fireplace + short hearth inside (defect) -->
  <rect x="396" y="280" width="68" height="60" fill="#5f5e5a"/>
  <rect x="404" y="296" width="52" height="44" fill="#2c2a26"/>
  <rect x="430" y="346" width="40" height="8" fill="#b9b6ad"/>
  <rect x="470" y="346" width="80" height="8" fill="#caa46a"/>
  <text x="430" y="372" font-size="10.5" fill="#993c1d" text-anchor="middle">hearth barely past opening</text>

  <!-- (3) pool with gate propped open (defect) -->
  <rect x="600" y="330" width="180" height="26" fill="#9fd6ec" stroke="#5b9cb5" stroke-width="2"/>
  <g stroke="#5f5e5a" stroke-width="4">
    <line x1="600" y1="300" x2="600" y2="356"/><line x1="640" y1="300" x2="640" y2="356"/>
    <line x1="720" y1="300" x2="720" y2="356"/><line x1="780" y1="300" x2="780" y2="356"/>
  </g>
  <line x1="660" y1="356" x2="690" y2="312" stroke="#993c1d" stroke-width="4"/>
  <text x="690" y="384" font-size="10.5" fill="#993c1d" text-anchor="middle">pool gate propped open</text>
</svg>
