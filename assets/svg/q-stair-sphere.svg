<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="sans-serif">
<defs><marker id="sa" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 1 L8 4 L0 7 Z" fill="#d85a30"/></marker></defs>
<rect width="700" height="300" fill="#eef7fb"/>
<text x="350" y="28" font-size="14" fill="#2c2a26" text-anchor="middle">An open-tread ('floating') stair — only treads, open gaps between them</text>
<!-- open treads (no risers) -->
<g fill="#cdbf9e" stroke="#a07d4e" stroke-width="1.5">
  <rect x="120" y="232" width="96" height="13"/>
  <rect x="190" y="196" width="96" height="13"/>
  <rect x="260" y="160" width="96" height="13"/>
  <rect x="330" y="124" width="96" height="13"/>
  <rect x="400" y="88" width="96" height="13"/>
</g>
<!-- stringer on the right side of the treads -->
<line x1="216" y1="248" x2="516" y2="98" stroke="#8a6f4e" stroke-width="6"/>
<text x="528" y="108" font-size="10.5" fill="#8a6f4e">stringer</text>
<!-- the open gap between two treads -->
<line x1="286" y1="173" x2="286" y2="209" stroke="#d85a30" stroke-width="1.6" marker-start="url(#sa)" marker-end="url(#sa)"/>
<text x="270" y="196" font-size="13" font-weight="bold" fill="#d85a30" text-anchor="end">gap = ?</text>
<text x="350" y="282" font-size="13" fill="#d85a30" text-anchor="middle">How big can the gap between open treads be — what must NOT fit through it?</text>
</svg>
