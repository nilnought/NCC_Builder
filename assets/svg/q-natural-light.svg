<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="sans-serif">
<rect width="700" height="280" fill="#eef7fb"/>
<!-- one habitable room -->
<rect x="120" y="50" width="460" height="180" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
<!-- window in the wall -->
<rect x="300" y="58" width="100" height="74" fill="#cfe8f0" stroke="#8aa6ad" stroke-width="2"/>
<line x1="350" y1="58" x2="350" y2="132" stroke="#8aa6ad" stroke-width="1.5"/>
<!-- daylight coming in -->
<g stroke="#efb727" stroke-width="2" opacity="0.85">
  <line x1="320" y1="132" x2="250" y2="210"/>
  <line x1="350" y1="132" x2="350" y2="214"/>
  <line x1="380" y1="132" x2="450" y2="210"/>
</g>
<text x="350" y="100" font-size="11.5" fill="#2c2a26" text-anchor="middle">window</text>
<text x="350" y="180" font-size="14" fill="#2c2a26" text-anchor="middle">habitable room</text>
<text x="350" y="262" font-size="14" fill="#d85a30" text-anchor="middle">window glass = ? % of the floor area</text>
</svg>
