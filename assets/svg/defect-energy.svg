<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="sans-serif">
  <rect width="800" height="450" fill="#eef7fb"/>
  <!-- attic interior (light void, so insulation & duct stand out) -->
  <polygon points="60,150 740,150 400,44" fill="#efe7d6" stroke="#d9c9a8" stroke-width="1"/>
  <!-- roof covering -->
  <line x1="60" y1="150" x2="400" y2="44" stroke="#c96f4a" stroke-width="9"/>
  <line x1="740" y1="150" x2="400" y2="44" stroke="#c96f4a" stroke-width="9"/>
  <!-- house body + ground -->
  <rect x="90" y="150" width="620" height="238" fill="#f0e6d2" stroke="#d9c9a8" stroke-width="2"/>
  <rect x="60" y="388" width="740" height="40" fill="#c9a36b"/>
  <rect x="90" y="150" width="620" height="6" fill="#d8cbb4"/>
  <text x="120" y="138" font-size="11" fill="#9a8f78">roof space</text>

  <!-- (1) ceiling batts with gaps between (defect) -->
  <g fill="#e8c468" stroke="#b8923a" stroke-width="1.5">
    <rect x="250" y="128" width="56" height="20" rx="3"/>
    <rect x="322" y="128" width="40" height="20" rx="3"/>
    <rect x="402" y="128" width="54" height="20" rx="3"/>
  </g>
  <text x="336" y="108" font-size="11" fill="#993c1d" text-anchor="middle">batts — gaps between them</text>

  <!-- (2) bare duct in the roof space (defect) -->
  <path d="M470 138 q44 -34 96 0" fill="none" stroke="#9aa0a6" stroke-width="11"/>
  <path d="M470 138 q44 -34 96 0" fill="none" stroke="#6b7176" stroke-width="1.5"/>
  <text x="516" y="104" font-size="11" fill="#993c1d" text-anchor="middle">bare duct</text>

  <!-- (5) rooftop solar (OK) — sitting on the right roof slope -->
  <polygon points="586,96 686,127 682,141 582,110" fill="#314a73" stroke="#1b2c47" stroke-width="2"/>
  <g stroke="#5a76a8" stroke-width="1"><line x1="612" y1="100" x2="608" y2="118"/><line x1="638" y1="108" x2="634" y2="126"/><line x1="664" y1="116" x2="660" y2="134"/></g>
  <text x="616" y="86" font-size="11" fill="#0f6e56" text-anchor="middle">rooftop solar</text>

  <!-- (3) external door with a gap underneath (defect) -->
  <rect x="96" y="240" width="60" height="148" fill="#8a6f4e"/>
  <circle cx="146" cy="318" r="4" fill="#3d3b36"/>
  <rect x="96" y="380" width="60" height="8" fill="#eef7fb"/>
  <text x="126" y="404" font-size="10.5" fill="#993c1d" text-anchor="middle">gap under door</text>

  <!-- (4) ceiling fan (OK) -->
  <line x1="352" y1="156" x2="352" y2="196" stroke="#5f5e5a" stroke-width="3"/>
  <ellipse cx="352" cy="200" rx="60" ry="9" fill="#b9b6ad"/>
  <circle cx="352" cy="200" r="7" fill="#8f8c84"/>
  <line x1="416" y1="200" x2="442" y2="200" stroke="#0f6e56" stroke-width="1"/>
  <text x="446" y="204" font-size="11" fill="#0f6e56">ceiling fan</text>
</svg>
