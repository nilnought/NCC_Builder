<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="sans-serif">
  <rect width="700" height="360" fill="#eef7fb"/>
  <!-- sloping ground -->
  <polygon points="0,140 700,280 700,360 0,360" fill="#c9a36b"/>
  <line x1="0" y1="140" x2="700" y2="280" stroke="#9bc97e" stroke-width="5"/>
  <!-- stepped strip footing, cast in its trench below ground -->
  <path d="M60 180 L220 180 L220 220 L390 220 L390 260 L560 260 L560 300 L660 300 L660 340 L60 340 Z" fill="#b9b6ad" stroke="#8f8c84" stroke-width="2"/>
  <text x="330" y="328" font-size="14" fill="#f5f3ee" text-anchor="middle">strip footing, cast in a trench below ground</text>
  <!-- ONE continuous brick wall stepping down with the footing
       (cut away over the first step so the step is visible) -->
  <path d="M240 100 L390 100 L390 140 L560 140 L560 180 L640 180 L640 300 L560 300 L560 260 L390 260 L390 220 L240 220 Z" fill="#c96f4a"/>
  <g stroke="#a8512f" stroke-width="1.5">
    <line x1="240" y1="130" x2="390" y2="130"/><line x1="240" y1="160" x2="390" y2="160"/><line x1="240" y1="190" x2="390" y2="190"/>
    <line x1="390" y1="170" x2="560" y2="170"/><line x1="390" y1="200" x2="560" y2="200"/><line x1="390" y1="230" x2="560" y2="230"/>
    <line x1="560" y1="210" x2="640" y2="210"/><line x1="560" y1="240" x2="640" y2="240"/><line x1="560" y1="270" x2="640" y2="270"/>
  </g>
  <text x="455" y="62" font-size="14" fill="#2c2a26" text-anchor="middle">one continuous brick wall, stepping down with the footing</text>
  <text x="140" y="88" font-size="12.5" fill="#6b675f" text-anchor="middle">(wall cut away here so you can see the step)</text>
  <!-- the exposed first step, dimensioned -->
  <line x1="230" y1="180" x2="230" y2="220" stroke="#d85a30" stroke-width="2.5"/>
  <line x1="222" y1="180" x2="238" y2="180" stroke="#d85a30" stroke-width="2.5"/>
  <line x1="222" y1="220" x2="238" y2="220" stroke="#d85a30" stroke-width="2.5"/>
  <text x="212" y="208" font-size="20" font-weight="bold" fill="#d85a30" text-anchor="end">?</text>
  <text x="64" y="122" font-size="14" fill="#d85a30">max height of a plain step</text>
  <line x1="160" y1="128" x2="222" y2="190" stroke="#d85a30" stroke-width="1.5" stroke-dasharray="4 4"/>
</svg>
