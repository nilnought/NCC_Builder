<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="sans-serif">
  <rect width="700" height="360" fill="#eef7fb"/>
  <!-- soil mass below the natural slope -->
  <polygon points="0,290 700,120 700,360 0,360" fill="#c9a36b"/>
  <!-- excavated area (drawn in sky colour = soil removed) -->
  <polygon points="120,261 430,186 430,270 120,270" fill="#eef7fb"/>
  <!-- platform + cut face outline -->
  <line x1="120" y1="270" x2="430" y2="270" stroke="#a8843f" stroke-width="3"/>
  <line x1="430" y1="270" x2="430" y2="186" stroke="#a8843f" stroke-width="3"/>
  <!-- grass on the untouched natural ground -->
  <line x1="0" y1="290" x2="120" y2="261" stroke="#9bc97e" stroke-width="5"/>
  <line x1="430" y1="186" x2="700" y2="120" stroke="#9bc97e" stroke-width="5"/>
  <!-- where the ground USED to be -->
  <line x1="120" y1="261" x2="430" y2="186" stroke="#6b675f" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="340" y="215" font-size="15" fill="#6b675f" text-anchor="end">natural ground level (before works)</text>
  <!-- depth dimension against the cut face -->
  <line x1="412" y1="191" x2="412" y2="270" stroke="#d85a30" stroke-width="2"/>
  <line x1="404" y1="191" x2="420" y2="191" stroke="#d85a30" stroke-width="2"/>
  <line x1="404" y1="270" x2="420" y2="270" stroke="#d85a30" stroke-width="2"/>
  <text x="396" y="226" font-size="20" font-weight="bold" fill="#d85a30" text-anchor="end">? m</text>
  <text x="396" y="246" font-size="14" fill="#d85a30" text-anchor="end">max depth</text>
  <!-- labels -->
  <text x="265" y="296" font-size="15" fill="#2c2a26" text-anchor="middle">flat building platform</text>
  <text x="442" y="225" font-size="15" fill="#2c2a26">un-retained cut face</text>
  <text x="442" y="244" font-size="14" fill="#6b675f">(no retaining wall)</text>
</svg>
