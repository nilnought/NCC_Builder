<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="sans-serif">
  <rect width="700" height="320" fill="#eef7fb"/>
  <text x="350" y="30" font-size="15" fill="#6b675f" text-anchor="middle">two Class A footing slabs, seen from above</text>
  <!-- short slab -->
  <rect x="60" y="60" width="240" height="110" fill="#b9b6ad" stroke="#8f8c84" stroke-width="2"/>
  <g stroke="#8f8c84" stroke-width="1">
    <line x1="60" y1="96" x2="300" y2="96"/><line x1="60" y1="132" x2="300" y2="132"/>
    <line x1="120" y1="60" x2="120" y2="170"/><line x1="180" y1="60" x2="180" y2="170"/><line x1="240" y1="60" x2="240" y2="170"/>
  </g>
  <line x1="60" y1="192" x2="300" y2="192" stroke="#6b675f" stroke-width="2"/>
  <line x1="60" y1="185" x2="60" y2="199" stroke="#6b675f" stroke-width="2"/>
  <line x1="300" y1="185" x2="300" y2="199" stroke="#6b675f" stroke-width="2"/>
  <text x="180" y="214" font-size="15" fill="#2c2a26" text-anchor="middle">10 m long</text>
  <text x="180" y="244" font-size="18" font-weight="bold" fill="#d85a30" text-anchor="middle">mesh ?</text>
  <!-- long slab -->
  <rect x="340" y="60" width="330" height="110" fill="#b9b6ad" stroke="#8f8c84" stroke-width="2"/>
  <g stroke="#8f8c84" stroke-width="1">
    <line x1="340" y1="96" x2="670" y2="96"/><line x1="340" y1="132" x2="670" y2="132"/>
    <line x1="395" y1="60" x2="395" y2="170"/><line x1="450" y1="60" x2="450" y2="170"/>
    <line x1="505" y1="60" x2="505" y2="170"/><line x1="560" y1="60" x2="560" y2="170"/><line x1="615" y1="60" x2="615" y2="170"/>
  </g>
  <line x1="340" y1="192" x2="670" y2="192" stroke="#6b675f" stroke-width="2"/>
  <line x1="340" y1="185" x2="340" y2="199" stroke="#6b675f" stroke-width="2"/>
  <line x1="670" y1="185" x2="670" y2="199" stroke="#6b675f" stroke-width="2"/>
  <text x="505" y="214" font-size="15" fill="#2c2a26" text-anchor="middle">16 m long</text>
  <text x="505" y="244" font-size="18" font-weight="bold" fill="#d85a30" text-anchor="middle">mesh ?</text>
  <text x="350" y="295" font-size="15" fill="#2c2a26" text-anchor="middle">same site, same walls — why would the LONGER slab need heavier mesh?</text>
</svg>
