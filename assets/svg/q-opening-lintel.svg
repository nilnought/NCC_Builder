<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" font-family="sans-serif">
<defs>
  <pattern id="mu" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="12" height="12" fill="#e7e3d8"/>
    <line x1="0" y1="0" x2="0" y2="12" stroke="#b9b3a3" stroke-width="1"/>
  </pattern>
</defs>
<rect width="700" height="330" fill="#eef7fb"/>
<text x="350" y="22" font-size="15" fill="#2c2a26" text-anchor="middle">The steel angle lintel carries the bricks over a window. Which way up does it go?</text>
<text x="350" y="40" font-size="11.5" fill="#6b675f" text-anchor="middle">section cut through the window head · same bricks AND same angle both ways — only rotated</text>

<!-- ===== Config A: long leg vertical ===== -->
<rect x="150" y="66" width="84" height="60" fill="url(#mu)" stroke="#9a8f78" stroke-width="1.2"/>
<line x1="150" y1="86" x2="234" y2="86" stroke="#9a8f78" stroke-width="1"/>
<line x1="150" y1="106" x2="234" y2="106" stroke="#9a8f78" stroke-width="1"/>
<!-- one bent angle: long leg vertical (80) + short leg horizontal (58), brick overhangs the short leg -->
<path d="M234 46 L242 46 L242 134 L176 134 L176 126 L234 126 Z" fill="#3d3b36"/>
<line x1="242" y1="80" x2="272" y2="74" stroke="#2f6b8f" stroke-width="1"/><text x="276" y="78" font-size="11.5" fill="#2f6b8f">long leg</text>
<line x1="176" y1="130" x2="130" y2="130" stroke="#b9701a" stroke-width="1"/><text x="126" y="133" font-size="11.5" fill="#b9701a" text-anchor="end">short leg</text>
<rect x="152" y="140" width="80" height="10" fill="#9a9a9a" stroke="#6b675f" stroke-width="1"/>
<rect x="158" y="150" width="68" height="58" fill="#cfe8f0" stroke="#8aa6ad" stroke-width="1.5"/>
<text x="192" y="224" font-size="11" fill="#2c2a26" text-anchor="middle">window</text>
<text x="192" y="252" font-size="20" font-weight="bold" fill="#2c2a26" text-anchor="middle">A</text>

<!-- ===== Config B: long leg horizontal (lying flat) ===== -->
<rect x="450" y="66" width="84" height="60" fill="url(#mu)" stroke="#9a8f78" stroke-width="1.2"/>
<line x1="450" y1="86" x2="534" y2="86" stroke="#9a8f78" stroke-width="1"/>
<line x1="450" y1="106" x2="534" y2="106" stroke="#9a8f78" stroke-width="1"/>
<!-- the SAME angle rotated: long leg horizontal (80) + short leg vertical (58), upstand against the brick -->
<path d="M534 68 L542 68 L542 134 L454 134 L454 126 L534 126 Z" fill="#3d3b36"/>
<line x1="454" y1="130" x2="410" y2="130" stroke="#2f6b8f" stroke-width="1"/><text x="406" y="133" font-size="11.5" fill="#2f6b8f" text-anchor="end">long leg</text>
<line x1="542" y1="90" x2="572" y2="84" stroke="#b9701a" stroke-width="1"/><text x="576" y="88" font-size="11.5" fill="#b9701a">short leg</text>
<rect x="452" y="140" width="80" height="10" fill="#9a9a9a" stroke="#6b675f" stroke-width="1"/>
<rect x="458" y="150" width="68" height="58" fill="#cfe8f0" stroke="#8aa6ad" stroke-width="1.5"/>
<text x="492" y="224" font-size="11" fill="#2c2a26" text-anchor="middle">window</text>
<text x="492" y="252" font-size="20" font-weight="bold" fill="#2c2a26" text-anchor="middle">B</text>

<text x="350" y="290" font-size="13" fill="#d85a30" text-anchor="middle">Same angle, rotated — is A or B the right way up?</text>
</svg>
