<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="sans-serif">
<rect width="700" height="260" fill="#eef7fb"/>
<!-- stair flight -->
<polygon points="120,230 120,190 220,190 220,150 320,150 320,110 420,110 420,70 520,70 520,230" fill="#d9c9a8" stroke="#8a6f4e" stroke-width="2"/>
<!-- brackets supporting the handrail above the treads -->
<g stroke="#6b675f" stroke-width="3">
  <line x1="200" y1="158" x2="200" y2="126"/>
  <line x1="320" y1="110" x2="320" y2="78"/>
  <line x1="440" y1="62" x2="440" y2="30"/>
</g>
<!-- the handrail (grab-rail), running up the flight above the nosings -->
<line x1="148" y1="153" x2="500" y2="12" stroke="#5f5e5a" stroke-width="7" stroke-linecap="round"/>
<text x="250" y="96" font-size="13" font-weight="bold" fill="#d85a30">handrail = ?</text>
<text x="350" y="244" font-size="13" fill="#2c2a26" text-anchor="middle">The grab-rail — how far along the flight must it run, and on how many sides?</text>
</svg>
