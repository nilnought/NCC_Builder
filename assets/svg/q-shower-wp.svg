<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="sans-serif">
  <rect width="700" height="320" fill="#eef7fb"/>
  <!-- shower recess cross-section -->
  <rect x="180" y="40" width="300" height="240" fill="#f3f6f7" stroke="#b4b2a9" stroke-width="2"/>
  <!-- back wall + side wall tiles -->
  <rect x="180" y="40" width="20" height="240" fill="#cfe0e6"/>
  <rect x="460" y="40" width="20" height="240" fill="#cfe0e6"/>
  <!-- floor -->
  <rect x="180" y="262" width="300" height="18" fill="#b9b6ad"/>
  <!-- floor waste -->
  <rect x="316" y="262" width="28" height="8" fill="#8f8c84"/>
  <!-- waterproof zone marker on the back wall -->
  <line x1="210" y1="262" x2="210" y2="120" stroke="#1d9e75" stroke-width="5"/>
  <text x="300" y="170" font-size="14" fill="#2c2a26" text-anchor="middle">waterproof wall zone</text>
  <text x="300" y="250" font-size="13" fill="#3d3b36" text-anchor="middle">waterproof floor + junctions</text>
  <!-- height dimension -->
  <line x1="150" y1="120" x2="150" y2="262" stroke="#d85a30" stroke-width="2"/>
  <line x1="142" y1="120" x2="158" y2="120" stroke="#d85a30" stroke-width="2"/>
  <line x1="142" y1="262" x2="158" y2="262" stroke="#d85a30" stroke-width="2"/>
  <line x1="150" y1="120" x2="208" y2="120" stroke="#d85a30" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="134" y="186" font-size="20" font-weight="bold" fill="#d85a30" text-anchor="end">? mm</text>
  <text x="134" y="206" font-size="13" fill="#d85a30" text-anchor="end">min height</text>
  <text x="330" y="300" font-size="13" fill="#6b675f" text-anchor="middle">enclosed shower, side view</text>
</svg>
