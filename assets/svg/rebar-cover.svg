<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="sans-serif">
  <rect width="700" height="340" fill="#eef7fb"/>
  <!-- ground -->
  <rect x="0" y="250" width="700" height="90" fill="#c9a36b"/>
  <!-- membrane under the left half only -->
  <line x1="150" y1="250" x2="370" y2="250" stroke="#2c2a26" stroke-width="5"/>
  <text x="255" y="280" font-size="14" fill="#f5f3ee" text-anchor="middle">membrane on ground</text>
  <text x="475" y="280" font-size="14" fill="#f5f3ee" text-anchor="middle">bare ground</text>
  <!-- concrete footing -->
  <rect x="150" y="80" width="400" height="170" fill="#b9b6ad"/>
  <line x1="150" y1="80" x2="550" y2="80" stroke="#8f8c84" stroke-width="3"/>
  <text x="350" y="74" font-size="14" fill="#6b675f" text-anchor="middle">internal floor surface</text>
  <!-- reinforcement bars (section dots) -->
  <g fill="#5f5e5a">
    <circle cx="230" cy="215" r="9"/><circle cx="350" cy="215" r="9"/><circle cx="470" cy="215" r="9"/>
    <circle cx="350" cy="115" r="9"/>
  </g>
  <!-- cover dimensions -->
  <g stroke="#d85a30" stroke-width="2">
    <line x1="230" y1="226" x2="230" y2="248"/>
    <line x1="470" y1="226" x2="470" y2="248"/>
    <line x1="350" y1="104" x2="350" y2="82"/>
  </g>
  <g font-size="18" font-weight="bold" fill="#d85a30" text-anchor="middle">
    <text x="206" y="244">?</text>
    <text x="494" y="244">?</text>
    <text x="372" y="96">?</text>
  </g>
  <text x="350" y="170" font-size="15" fill="#3d3b36" text-anchor="middle">concrete — the steel needs a minimum "skin" on every face</text>
  <text x="350" y="320" font-size="14" fill="#2c2a26" text-anchor="middle">three exposures, three different minimum covers — which is which?</text>
</svg>
