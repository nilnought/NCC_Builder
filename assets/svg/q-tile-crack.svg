<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="sans-serif">
  <rect width="700" height="320" fill="#eef7fb"/>
  <text x="350" y="30" font-size="15" fill="#6b675f" text-anchor="middle">a big tiled floor, a few months after the pour</text>
  <!-- tiled floor (plan) -->
  <rect x="80" y="50" width="540" height="220" fill="#e8e4da" stroke="#8f8c84" stroke-width="2"/>
  <g stroke="#b4b2a9" stroke-width="2">
    <line x1="170" y1="50" x2="170" y2="270"/><line x1="260" y1="50" x2="260" y2="270"/>
    <line x1="350" y1="50" x2="350" y2="270"/><line x1="440" y1="50" x2="440" y2="270"/>
    <line x1="530" y1="50" x2="530" y2="270"/>
    <line x1="80" y1="123" x2="620" y2="123"/><line x1="80" y1="196" x2="620" y2="196"/>
  </g>
  <!-- crack telegraphing through the tiles -->
  <path d="M95 250 L180 210 L230 225 L330 160 L390 170 L470 105 L540 95 L610 60"
        stroke="#d85a30" stroke-width="3.5" fill="none" stroke-linejoin="round"/>
  <text x="350" y="300" font-size="15" fill="#d85a30" text-anchor="middle">the slab shrank underneath — and the brittle tiles cracked with it</text>
</svg>
