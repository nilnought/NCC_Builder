<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="sans-serif">
  <rect width="700" height="300" fill="#eef7fb"/>
  <!-- cut-away bathroom wall: studs + noggings behind lining -->
  <rect x="120" y="40" width="460" height="220" fill="#f3f6f7" stroke="#b4b2a9" stroke-width="2"/>
  <!-- studs -->
  <g fill="#caa46a">
    <rect x="170" y="40" width="16" height="220"/>
    <rect x="300" y="40" width="16" height="220"/>
    <rect x="430" y="40" width="16" height="220"/>
  </g>
  <!-- label the studs (the yellow vertical framing) -->
  <text x="470" y="66" font-size="10.5" fill="#7c5f2c" text-anchor="end">studs (wall framing)</text>
  <line x1="472" y1="62" x2="438" y2="92" stroke="#7c5f2c" stroke-width="0.9"/>
  <!-- noggings / reinforcement backing (highlighted) -->
  <rect x="186" y="150" width="114" height="20" fill="#1d9e75"/>
  <rect x="316" y="150" width="114" height="20" fill="#1d9e75"/>
  <text x="350" y="120" font-size="14" fill="#0f6e56" text-anchor="middle">reinforcement built into the wall</text>
  <!-- lining (partial, peeled to reveal) -->
  <rect x="120" y="40" width="40" height="220" fill="#e3ded4"/>
  <text x="350" y="200" font-size="14" fill="#2c2a26" text-anchor="middle">bathroom wall (lining cut away)</text>
  <text x="350" y="285" font-size="13" fill="#6b675f" text-anchor="middle">what is this backing for?</text>
</svg>
