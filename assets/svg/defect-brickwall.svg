<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="sans-serif">
  <defs>
    <pattern id="bw" width="88" height="40" patternUnits="userSpaceOnUse">
      <rect width="88" height="40" fill="#cd7d58"/>
      <g stroke="#a8512f" stroke-width="2">
        <line x1="0" y1="20" x2="88" y2="20"/><line x1="0" y1="40" x2="88" y2="40"/>
        <line x1="44" y1="0" x2="44" y2="20"/><line x1="0" y1="20" x2="0" y2="40"/><line x1="88" y1="20" x2="88" y2="40"/>
      </g>
    </pattern>
    <pattern id="bw2" width="44" height="20" patternUnits="userSpaceOnUse">
      <rect width="44" height="20" fill="#cd7d58"/>
      <g stroke="#a8512f" stroke-width="1.5"><line x1="0" y1="10" x2="44" y2="10"/><line x1="0" y1="20" x2="44" y2="20"/><line x1="22" y1="0" x2="22" y2="10"/></g>
    </pattern>
    <marker id="lead" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#3d3b36"/></marker>
  </defs>
  <rect width="800" height="460" fill="#eef7fb"/>
  <text x="290" y="22" font-size="13" fill="#6b675f" text-anchor="middle">brick veneer wall, seen from the FACE (outside) — two cut-aways at right</text>

  <!-- ground + slab -->
  <rect x="0" y="393" width="800" height="67" fill="#c9a36b"/>
  <rect x="50" y="375" width="510" height="18" fill="#b9b6ad"/>
  <!-- the wall -->
  <rect x="50" y="55" width="510" height="320" fill="url(#bw)"/>
  <!-- DPC / flashing line -->
  <line x1="50" y1="330" x2="560" y2="330" stroke="#2c2a26" stroke-width="4"/>

  <!-- (1) defect: garden soil piled against the wall base, burying weepholes + DPC -->
  <path d="M50 393 Q56 270 128 264 Q172 261 178 393 Z" fill="#9a7b3f"/>
  <g fill="#5a8a4a"><circle cx="86" cy="290" r="13"/><circle cx="112" cy="276" r="11"/><circle cx="138" cy="294" r="11"/></g>
  <text x="112" y="244" font-size="11" fill="#1f3d2a" text-anchor="middle">garden soil piled against the wall base</text>
  <line x1="112" y1="252" x2="110" y2="292" stroke="#3d3b36" stroke-width="1" marker-end="url(#lead)"/>

  <!-- (4) compliant: vertical articulation joint (well clear of everything else) -->
  <rect x="212" y="55" width="9" height="275" fill="#3d3b36"/>
  <rect x="214" y="55" width="4" height="275" fill="#6b675f"/>
  <text x="216" y="48" font-size="11" fill="#3d3b36" text-anchor="middle">vertical joint</text>

  <!-- window (context) with a header course -->
  <rect x="275" y="150" width="110" height="120" fill="#cfe8f0" stroke="#8aa6ad" stroke-width="2"/>
  <line x1="330" y1="150" x2="330" y2="270" stroke="#8aa6ad" stroke-width="2"/>
  <rect x="267" y="138" width="126" height="12" fill="#5f5e5a"/>
  <text x="330" y="216" font-size="12" fill="#2c2a26" text-anchor="middle">window</text>

  <!-- (5) compliant: clean weepholes above the flashing -->
  <g fill="#eef7fb"><rect x="436" y="312" width="9" height="18"/><rect x="476" y="312" width="9" height="18"/><rect x="516" y="312" width="9" height="18"/></g>
  <text x="480" y="356" font-size="11" fill="#1f3d2a" text-anchor="middle">weepholes — open, above the flashing</text>
  <line x1="480" y1="346" x2="480" y2="332" stroke="#3d3b36" stroke-width="1" marker-end="url(#lead)"/>

  <!-- ===== (2) cut-away inset A: the lintel, end-on (bricks overhang the flat angle) ===== -->
  <line x1="393" y1="144" x2="572" y2="116" stroke="#3d3b36" stroke-width="1.4" stroke-dasharray="6 4"/>
  <rect x="572" y="68" width="196" height="150" fill="#ffffff" stroke="#5f5e5a" stroke-width="2"/>
  <text x="670" y="86" font-size="11.5" fill="#2c2a26" text-anchor="middle">cut-away: the lintel, end-on</text>
  <!-- steel angle lying FLAT: long leg horizontal + short leg upstand at the back -->
  <rect x="624" y="146" width="116" height="9" fill="#3d3b36"/>
  <rect x="732" y="118" width="8" height="37" fill="#3d3b36"/>
  <!-- bricks sitting on the flat leg but CANTILEVERING well past its front edge (empty space below the overhang) -->
  <rect x="580" y="112" width="118" height="34" fill="url(#bw2)" stroke="#8a4327" stroke-width="1.2"/>
  <text x="600" y="180" font-size="10.5" fill="#2c2a26" text-anchor="middle">bricks</text>
  <line x1="600" y1="172" x2="600" y2="148" stroke="#3d3b36" stroke-width="0.9" marker-end="url(#lead)"/>
  <text x="700" y="178" font-size="10.5" fill="#2c2a26" text-anchor="middle">steel angle</text>
  <line x1="700" y1="170" x2="690" y2="156" stroke="#3d3b36" stroke-width="0.9" marker-end="url(#lead)"/>

  <!-- ===== (3) cut-away inset B: inside the cavity ===== -->
  <rect x="572" y="236" width="196" height="150" fill="#ffffff" stroke="#5f5e5a" stroke-width="2"/>
  <text x="670" y="254" font-size="11.5" fill="#2c2a26" text-anchor="middle">cut-away: inside the cavity</text>
  <rect x="588" y="264" width="34" height="108" fill="url(#bw2)"/>
  <rect x="730" y="264" width="30" height="108" fill="#cfae87"/>
  <text x="605" y="384" font-size="10" fill="#2c2a26" text-anchor="middle">brick</text>
  <text x="745" y="384" font-size="10" fill="#2c2a26" text-anchor="middle">frame</text>
  <!-- wall ties spanning the cavity -->
  <g stroke="#5f5e5a" stroke-width="3"><line x1="622" y1="298" x2="730" y2="302"/><line x1="622" y1="348" x2="730" y2="350"/></g>
  <!-- mortar droppings piled on the upper tie, bridging brick to frame -->
  <path d="M620 298 q14 -14 30 -6 q10 -12 24 -4 q14 -2 36 4 l0 16 q-22 8 -42 2 q-16 -4 -28 4 q-12 6 -20 0 Z" fill="#9a958a" stroke="#7c776c" stroke-width="1.5"/>
  <text x="676" y="294" font-size="10" fill="#3d3b36" text-anchor="middle">mortar droppings</text>
</svg>
