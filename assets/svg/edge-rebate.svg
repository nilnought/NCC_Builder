<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="sans-serif">
  <rect width="700" height="340" fill="#eef7fb"/>
  <!-- slab with rebate step at its outer top corner -->
  <path d="M250 90 L700 90 L700 250 L180 250 L180 130 L250 130 Z" fill="#b9b6ad"/>
  <line x1="250" y1="90" x2="700" y2="90" stroke="#8f8c84" stroke-width="3"/>
  <text x="490" y="190" font-size="16" fill="#3d3b36" text-anchor="middle">concrete slab / edge beam</text>
  <text x="490" y="82" font-size="14" fill="#6b675f" text-anchor="middle">floor level</text>
  <!-- future brick skin sitting in the rebate (dashed) -->
  <g fill="none" stroke="#c96f4a" stroke-width="2" stroke-dasharray="6 5">
    <rect x="180" y="20" width="70" height="36"/>
    <rect x="180" y="58" width="70" height="36"/>
    <rect x="180" y="96" width="70" height="34"/>
  </g>
  <text x="215" y="14" font-size="14" fill="#993c1d" text-anchor="middle">brick veneer skin (later)</text>
  <!-- ground -->
  <polygon points="0,180 180,180 180,250 700,250 700,340 0,340" fill="#c9a36b"/>
  <line x1="0" y1="180" x2="180" y2="180" stroke="#9bc97e" stroke-width="5"/>
  <!-- rebate depth: the vertical step down from floor level to the brick ledge -->
  <line x1="140" y1="90" x2="140" y2="130" stroke="#d85a30" stroke-width="2"/>
  <line x1="132" y1="90" x2="148" y2="90" stroke="#d85a30" stroke-width="2"/>
  <line x1="132" y1="130" x2="148" y2="130" stroke="#d85a30" stroke-width="2"/>
  <line x1="140" y1="90" x2="248" y2="90" stroke="#d85a30" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="124" y="100" font-size="20" font-weight="bold" fill="#d85a30" text-anchor="end">?</text>
  <text x="124" y="118" font-size="14" fill="#d85a30" text-anchor="end">rebate depth</text>
  <text x="124" y="134" font-size="13" fill="#d85a30" text-anchor="end">(the step DOWN)</text>
  <!-- point out the rebate ledge itself -->
  <line x1="215" y1="136" x2="215" y2="158" stroke="#5f5e5a" stroke-width="1.5"/>
  <text x="215" y="174" font-size="13" fill="#3d3b36" text-anchor="middle">the edge rebate</text>
</svg>
